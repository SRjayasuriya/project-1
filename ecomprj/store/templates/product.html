{% extends 'base.html' %}
{% block content %}

<div class="container px-4 px-lg-5 my-5">
    <div class="product-detail-wrap">
        <div class="row g-0">
            <!-- Image -->
            <div class="col-md-5" style="background:var(--bg-secondary);overflow:hidden;min-height:350px">
                <img src="{{ product.image.url }}" class="product-detail-img" alt="{{ product.name }}" />
            </div>
            <!-- Info -->
            <div class="col-md-7">
                <div class="product-detail-body">
                    <p class="product-category mb-2">
                        <i class="bi bi-tag me-1"></i>{{ product.category }}
                    </p>
                    <h1 class="product-detail-title">{{ product.name }}</h1>
                    <p class="product-detail-desc">{{ product.description }}</p>

                    <div class="price-wrap mb-4">
                        {% if product.is_sale %}
                        <span class="price-original" style="font-size:1.1rem">₹{{ product.price }}</span>
                        <span class="price-sale" style="font-size:1.5rem">₹{{ product.sale_price }}</span>
                        <span class="sale-badge" style="position:static;animation:none">On Sale!</span>
                        {% else %}
                        <span class="price-regular" style="font-size:1.5rem">₹{{ product.price }}</span>
                        {% endif %}
                    </div>

                    <div class="section-divider"></div>

                    <!-- Quantity -->
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <label style="color:var(--text-secondary);font-size:0.9rem;font-weight:500">Quantity</label>
                        <select class="quantity-select" id="qty-cart">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                        </select>
                    </div>

                    <!-- Actions -->
                    <div class="d-flex gap-3 flex-wrap">
                        <button type="button" value="{{ product.id }}" class="btn btn-add-cart ripple" id="add-cart">
                            <i class="bi bi-bag-plus me-2"></i>Add to Cart
                        </button>
                        <a href="{% url 'home' %}" class="btn-view" style="width:auto;padding:.75rem 1.5rem">
                            <span><i class="bi bi-arrow-left me-1"></i>Back</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$(document).on('click', '#add-cart', function(e) {
    e.preventDefault();
    const btn = $(this);
    btn.html('<i class="bi bi-hourglass-split me-2"></i>Adding...');
    $.ajax({
        type: 'POST',
        url: '{% url "cart-add" %}',
        data: {
            product_id: btn.val(),
            product_qty: $('#qty-cart option:selected').text(),
            csrfmiddlewaretoken: '{{ csrf_token }}',
            action: 'post'
        },
        success: function(json) {
            document.getElementById('cart_quantity').textContent = json.quantity;
            btn.html('<i class="bi bi-check2-circle me-2"></i>Added!');
            setTimeout(() => btn.html('<i class="bi bi-bag-plus me-2"></i>Add to Cart'), 1800);
            location.reload();
        },
        error: function() {
            btn.html('<i class="bi bi-bag-plus me-2"></i>Add to Cart');
        }
    });
});
</script>

{% endblock %}
