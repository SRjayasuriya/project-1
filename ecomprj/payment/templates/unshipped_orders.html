{% extends 'base.html' %}

{% block content %}

 
        <div class='container'>
            <div class='row'>
                <center>
                    <div class='col-8'>


            <br/><br/>


            <h2>Unshipped Orders</h2>


            <br/><br/>


            <table class="table table-striped table-hover table-bordered">
                <thead>
                    <tr>
                    <th scope="col">Order ID</th>
                    <th scope="col">Price</th>
                    <th scope="col">Customer Email</th>
                    <th scope="col">Date Of Ordered</th>
                    <th scope="col">Mark</th>
                    <th scope="col">Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for items in orders %}
                        <tr>
                        <td><a href="{% url 'order_details' items.id %}">{{ items.id }}</a></td>
                        <td>{{ items.amount_paid }}</td>
                        <td>{{ items.email }}</td>
                        <td>{{ items.date_ordered }}</td>
                        <td><a href="{% url 'mark_shipped' items.id %}" class="btn btn-success">Mark as Shipped</a></td>
                        <td><a href="{% url 'delete_order' items.id %}" class="btn btn-danger">Delete</a></td>
                        </tr>
                    {% endfor %}

                </tbody>
            </table>


            <br/><br/>


                </center>
            </div>
        </div>

<br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/>
{% endblock %}
